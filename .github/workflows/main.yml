name: CI-CD Pipeline (Docker + ArgoCD)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: praneeth0108/python-devops-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # ✅ 1. Checkout Application Code
    - name: Checkout App Repo
      uses: actions/checkout@v3

    # ✅ 2. Set Dynamic Tag
    - name: Set Image Tag
      run: echo "TAG=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

    # ✅ 3. Login to DockerHub
    - name: Docker Login
      run: |
        echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

    # ✅ 4. Build Docker Image
    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME:$TAG .

    # ✅ 5. Push Docker Image
    - name: Push Docker Image
      run: docker push $IMAGE_NAME:$TAG

    # ✅ 6. Clone ArgoCD Repo
    - name: Clone ArgoCD Repo
      run: |
        git clone https://github.com/praneeth010/python_Application_Argocd.git

    # ✅ 7. Update deployment.yaml with new image
    - name: Update Kubernetes YAML
      run: |
        cd python_Application_Argocd
        sed -i "s|image: .*|image: $IMAGE_NAME:$TAG|" deployment.yaml

    # ✅ 8. Commit & Push Changes (FIXED ✅)
    - name: Push Changes to ArgoCD Repo
      run: |
        cd python_Application_Argocd

        git config user.email "ratnalapraneeth@gmail.com"
        git config user.name "praneeth010"

        git add .
        git commit -m "Update image to $IMAGE_NAME:$TAG" || echo "No changes"

        git remote set-url origin https://${{ secrets.GIT_TOKEN }}@github.com/praneeth010/python_Application_Argocd.git
        git push origin main